<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT. Merdeka Sejahtera Bersama</title>

    <link rel="stylesheet" href="css/style2.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <!-- LEFT -->
        <div class="left-panel">
            <div class="overlay"></div>

            <div class="company-info">
                <img src="img/logo.jpg" alt="Logo PT MSB" class="logo">

                <h1>PT. MERDEKA<br>SEJAHTERA BERSAMA</h1>

                <p>
                    Solusi terpercaya untuk pengelolaan bisnis modern,
                    profesional, aman, dan berkelanjutan.
                </p>

            </div>
        </div>

        <!-- RIGHT -->
        <div class="right-panel">

            <div class="login-box">

                <img src="img/logo.jpg" class="login-logo">

                <h2>Selamat Datang</h2>
                <p class="subtitle">
                    Login untuk mengakses sistem PT. Merdeka Sejahtera Bersama
                </p>

                <form id="loginForm">

                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Masukkan Username">
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Masukkan Password">
                    </div>

                    <button type="submit" class="btn-login">
                        LOGIN
                    </button>

                </form>

                <div class="footer-text">
                    © 2026 PT. Merdeka Sejahtera Bersama
                </div>

            </div>

        </div>

    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {

            e.preventDefault();

            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;

            // Username dan password contoh
            if (username === "admin" && password === "admin") {
                alert("Login Berhasil!");
                window.location.href = "dashboard.html";
            } else {
                alert("Username atau Password Salah!");
            }

        });
    </script>

</body>

</html>
